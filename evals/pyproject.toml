[tool.pytest.ini_options]
# pytest config for the new evals framework. Run with `pytest evals/` from repo root.
minversion = "8.0"
testpaths = ["packs", "skills", "static"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
# Skip legacy harness scratch dirs and committed run artefacts so pytest
# doesn't walk into them (they're slow and full of irrelevant .py files).
norecursedirs = [
    "workspaces", "fixtures", "results", "results-local", "reports",
    "data", "__pycache__", ".pytest_cache",
]
addopts = [
    "-ra",
    "--strict-markers",
    "--tb=short",
    "-p", "no:cacheprovider",
    # `importlib` import mode lets two packs ship a test file with the same
    # basename (e.g. `test_smoke_plugin_conformance.py` in both prd-pilot and
    # product-knowledge-brain) without a whole-tree collection error.
    "--import-mode=importlib",
]
# Global per-test timeout default (H1). Raised to 2700s (45min) so it sits
# comfortably ABOVE the highest per-test `@pytest.mark.timeout(<seconds>)`
# marker in the suite (the context-pack-builder behavioural tests use markers
# up to 2550s, whose internal run_agent budgets degrade to a clean SKIP well
# before the marker fires). This default only applies to tests WITHOUT their
# own marker; per-test markers fully override it. Raising the ceiling is a
# safe direction for other packs (more headroom, never a tighter kill).
# Ordering invariant the suite maintains:
#   internal run_agent timeout  <  per-test @pytest.mark.timeout  <  global (this value)
# `thread` method works on Windows; `signal` is POSIX-only.
timeout = 2700
timeout_method = "thread"
markers = [
    "slow: marks evals that take > 60s (deselect with '-m \"not slow\"')",
    "judge: marks evals that invoke the LLM judge",
    "skill: marks evals that exercise a skill in isolation",
    "pack: marks evals that exercise a full agent pack",
    "tooling: marks fast, no-LLM tooling smoke evals that drive a pack's scripts directly via bounded subprocess (select with '-m tooling')",
]
log_cli = true
log_cli_level = "INFO"
log_cli_format = "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
log_cli_date_format = "%H:%M:%S"

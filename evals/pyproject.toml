[tool.pytest.ini_options]
# pytest config for the new evals framework. Run with `pytest evals/` from repo root.
minversion = "8.0"
testpaths = ["packs", "skills", "static"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
# Skip legacy harness scratch dirs and committed run artefacts so pytest
# doesn't walk into them (they're slow and full of irrelevant .py files).
norecursedirs = [
    "workspaces", "fixtures", "results", "results-local", "reports",
    "data", "__pycache__", ".pytest_cache",
]
addopts = [
    "-ra",
    "--strict-markers",
    "--tb=short",
    "-p", "no:cacheprovider",
]
# Per-test timeout (H1). 1500s = 25min, comfortably covers the longest
# spec-author tests (timeout=1200 inside the test body) with headroom for
# staging + assertions. Tests with genuinely longer budgets opt in via
# `@pytest.mark.timeout(<seconds>)`. `thread` method works on Windows;
# `signal` is POSIX-only.
timeout = 1500
timeout_method = "thread"
markers = [
    "slow: marks evals that take > 60s (deselect with '-m \"not slow\"')",
    "judge: marks evals that invoke the LLM judge",
    "skill: marks evals that exercise a skill in isolation",
    "pack: marks evals that exercise a full agent pack",
    "tooling: marks fast, no-LLM tooling smoke evals that drive a pack's scripts directly via bounded subprocess (select with '-m tooling')",
]
log_cli = true
log_cli_level = "INFO"
log_cli_format = "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
log_cli_date_format = "%H:%M:%S"

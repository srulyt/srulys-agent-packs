# Pack spec for spec-author.
#
# Encodes the contracts the four sub-agents and the orchestrator
# declare in their .agent.md frontmatter and "File Access Boundaries"
# sections. Cases under cases/* may override severity/expectations
# per case.
#
# Iteration-1 default: every rubric ships at severity: info (C2).
# Per-case rubric escalations to warn/error are encoded in
# case.yaml when that case specifically asserts the dimension.

schema_version: 1
pack: spec-author
orchestrator: spec-author

models:
  spec-author:        claude-sonnet-4.6
  context-detective:  claude-sonnet-4.6
  prd-interviewer:    claude-sonnet-4.6
  prd-drafter:        claude-sonnet-4.6
  prd-critic:         claude-sonnet-4.6
  judge:              claude-opus-4.7

loops:
  max_orchestrator_turns: 40

# Repo-wide write-scope deny list (C3): no eval run may scribble in
# the eval engine's own scratch space or in .git, regardless of any
# allow rule below.
scope_deny:
  - "^_eval/"
  - "^\\.git/"

flow:
  ordering:
    - [context-detective, prd-drafter]
    - [prd-drafter, prd-critic]
  no_unexpected_agents: true

agents:
  - name: context-detective
    invocations: { min: 1, max: 2, must_complete: true }
    allowed_tools: [read, search, write, execute]
    write_scope_allow:
      - "^\\.spec-author/sessions/[^/]+/artifacts/discovery\\.json$"
      - "^\\.spec-author/sessions/[^/]+/artifacts/context-pack\\.md$"
    read_scope_allow:
      - "^\\.spec-author/sessions/[^/]+/.*"
      - "^\\.github/skills/.*"
      - "^\\.github/copilot-instructions\\.md$"
    output_contract:
      must_contain_sections:
        - discovery-summary
        - gaps-json
        - proposed-structure
        - sources-json
        - open-questions-json
        - ready-for-review
    no_subagent_reinvocation: true

  - name: prd-interviewer
    invocations: { min: 0, max: 1 }
    allowed_tools: [read, write]
    write_scope_allow:
      - "^\\.spec-author/sessions/[^/]+/artifacts/interview-questions\\.md$"
    read_scope_allow:
      - "^\\.spec-author/sessions/[^/]+/.*"
      - "^\\.github/skills/.*"
    output_contract:
      must_contain_sections:
        - interview-md
        - coverage-json
        - ready-for-review
    no_subagent_reinvocation: true

  - name: prd-drafter
    invocations: { min: 1, max: 3, must_complete: true }
    allowed_tools: [read, write]
    write_scope_allow:
      # Session-scratch artefacts the drafter always writes.
      - "^\\.spec-author/sessions/[^/]+/artifacts/specification\\.md$"
      - "^\\.spec-author/sessions/[^/]+/artifacts/CHANGELOG\\.md$"
      # User-chosen output paths from Stop 0 (output_path + spec_kind).
      # The orchestrator resolves output_path before delegating; the
      # drafter then writes the published spec there. Cases narrow
      # this further via `case.yaml.agent_overrides.prd-drafter
      # .write_scope_allow_extras` (anchored regex) when the test
      # asserts a specific user path.
      - "^docs/specs/[^/]+\\.md$"
      - "^docs/specs/[^/]+/CHANGELOG\\.md$"
      - "^docs/specs/CHANGELOG\\.md$"
    read_scope_allow:
      - "^\\.spec-author/sessions/[^/]+/.*"
      - "^\\.github/skills/.*"
    output_contract:
      must_contain_sections:
        - draft-summary
        - section-decisions-json
        - spec-path
        - ready-for-review
      # changelog-path and version-bump-json are required in
      # update-mode cases only; per-case overrides extend
      # must_contain_sections in cases/smoke-update-existing-spec/case.yaml.
    no_subagent_reinvocation: true

  - name: prd-critic
    invocations: { min: 1, max: 3, must_complete: true }
    allowed_tools: [read, write]
    write_scope_allow:
      - "^\\.spec-author/sessions/[^/]+/artifacts/spec-review\\.md$"
    read_scope_allow:
      - "^\\.spec-author/sessions/[^/]+/.*"
      - "^\\.github/skills/.*"
    output_contract:
      must_contain_sections:
        - verdict
        - scores-json
        - findings-json
        - ready-for-review
    no_subagent_reinvocation: true

  - name: spec-author
    invocations: { min: 1, max: 1, must_complete: true }
    allowed_tools: [read, search, write, agent]
    write_scope_allow:
      - "^\\.spec-author/.*"
      # Orchestrator may touch the user-chosen output path during
      # Stop 0 resolution (e.g. directory creation) before
      # delegating the actual file write to prd-drafter.
      - "^docs/specs/.*"
    read_scope_allow:
      - "^\\.spec-author/.*"
      - "^\\.github/skills/.*"
      - "^\\.github/copilot-instructions\\.md$"
      - "^agent-packs/spec-author/.*"
    prompt_contract:
      required_sections:
        - "Hard Delegation Rule (STOP-and-delegate)"
        - "How to Delegate (Task Tool Mechanics)"
        - "Stop A Protocol"
        - "Stop B Protocol"
        - "Mandatory Delegation"
        - "Must NOT"
    no_subagent_reinvocation: false

# C2: every rubric ships at severity: info. Per-case overrides in
# case.yaml escalate specific rubrics to warn / error when that
# case is specifically asserting the dimension.
rubrics:
  - id: mandatory-coverage           # D1
    apply_to: artifact:specification
    severity: info
  - id: gated-appropriateness        # D2
    apply_to: artifact:specification
    severity: info
  - id: naming-consistency           # D3
    apply_to: artifact:specification
    severity: info
  - id: content-quality              # D4
    apply_to: artifact:specification
    severity: info
    threshold: 0.7
  - id: changelog-completeness       # D5 — update mode only
    apply_to: artifact:changelog
    severity: info
    applies_when: "case.mode_kind == 'update'"
  - id: id-stability                 # D6 — update mode only
    apply_to: artifact:specification
    severity: info
    applies_when: "case.mode_kind == 'update'"
  - id: versioning-correctness       # D7 — update mode only
    apply_to: artifact:specification
    severity: info
    applies_when: "case.mode_kind == 'update'"
  - id: section-stability            # D8 — update mode only
    apply_to: artifact:specification
    severity: info
    applies_when: "case.mode_kind == 'update'"
  - id: edit-minimalism              # D10 — update mode only
    apply_to: artifact:specification
    severity: info
    applies_when: "case.mode_kind == 'update'"
  - id: scope-discipline             # D9 — product / mixed only
    # Penalises FRs that name internal components, libraries,
    # datastores, or specific APIs in product/mixed mode; rewards
    # confinement of any technical content to a Technical
    # Considerations appendix; rejects boilerplate
    # "implementation is out of scope" non-goals.
    apply_to: artifact:specification
    severity: info
    applies_when: "case.spec_kind in ['product', 'mixed']"
  - id: faithfulness-to-input
    apply_to: artifact:specification
    severity: info
  - id: format-compliance
    apply_to: artifact:specification
    severity: info
    threshold: 0.8

  # --- New rubrics introduced by the versioning-discipline build ---
  # All ship at severity: info per the standing iteration-1 rule
  # (new rubrics start at info to avoid scoring regressions before
  # baseline runs justify promotion to warn/error).

  - id: versioning-initial-state
    # Asserts a fresh greenfield draft is published with version
    # v0.1.0-draft (or the configured initial pre-publish version)
    # and that no version increment occurs while the spec stays in
    # draft. Derived from V1, V2.
    apply_to: artifact:specification
    severity: info

  - id: versioning-no-mid-draft-changelog
    # Asserts no CHANGELOG entry is written for changes made while
    # the spec is still in its initial pre-publish draft window.
    # The first CHANGELOG entry only appears at the publish
    # transition. Derived from V3, V4.
    apply_to: artifact:changelog
    severity: info

  - id: versioning-no-mid-draft-bump
    # Asserts that renumbers, restructures, and edits made within
    # an open draft window do NOT bump the version number — the
    # draft version is held constant until publish. Derived from
    # V2, V5.
    apply_to: artifact:specification
    severity: info

  - id: cross-ref-integrity
    # Asserts that when FRs/NFRs/ACs are renumbered inside a draft,
    # every internal cross-reference is updated to point at the new
    # IDs (no dangling references, no stale FR-04 pointing at what
    # is now FR-07). Derived from V5, V8.
    apply_to: artifact:specification
    severity: info

  - id: branch-probe-respected
    # Asserts the context-detective ran the V5 git branch probe
    # (`git rev-parse --abbrev-ref HEAD`) and surfaced the result
    # in discovery.json so downstream agents can decide between V6
    # (still-draft prompt) and V7 (published-on-main). Derived from
    # V5, V6, V17.
    apply_to: agent:context-detective
    severity: info

  - id: v6-prompt-verbatim
    # Asserts that when the branch probe shows the spec is still in
    # draft on main (no publish merge yet), the orchestrator emits
    # the V6 still-draft prompt verbatim — no paraphrase, no
    # silent publish, no skip. Derived from V6.
    apply_to: agent:spec-author
    severity: info

  - id: no-silent-publish
    # Asserts the system never transitions a spec from draft to
    # published without an explicit user-facing prompt and a
    # corresponding CHANGELOG entry. Any draft→published flip MUST
    # be user-acknowledged. Derived from V6, V11, V14.
    apply_to: artifact:specification
    severity: info

  - id: publish-transition
    # Asserts the publish transition (draft → 1.0.0 or the
    # user-chosen initial published version) drops the `-draft`
    # suffix, stamps the publication date, and leaves the prior
    # draft version recoverable from the CHANGELOG. Derived from
    # V11, V12.
    apply_to: artifact:specification
    severity: info

  - id: publish-initial-changelog
    # Asserts that the initial publish writes the first CHANGELOG
    # entry with the correct shape (version, date, summary of
    # everything accumulated during the draft window) — not a
    # placeholder, not empty. Derived from V11, V13.
    apply_to: artifact:changelog
    severity: info

  - id: redraft-window-version
    # Asserts that opening a re-draft of a published spec creates a
    # new draft version (e.g. v1.1.0-draft on top of v1.0.0) rather
    # than mutating the published version in place. Derived from
    # V14, V15.
    apply_to: artifact:specification
    severity: info

  - id: published-id-freeze
    # Asserts FR/NFR/AC IDs from the last published version are
    # frozen across the redraft window — no renumbers of published
    # IDs, only additions for new requirements. Derived from V15,
    # V16.
    apply_to: artifact:specification
    severity: info

  - id: no-mid-redraft-changelog
    # Asserts the redraft window writes no CHANGELOG entries until
    # the next publish transition (mirrors V3/V4 for re-drafts).
    # Derived from V14, V18.
    apply_to: artifact:changelog
    severity: info

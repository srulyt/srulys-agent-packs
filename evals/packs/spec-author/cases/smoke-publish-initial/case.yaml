id: smoke-publish-initial
pack: spec-author
description: "Smoke test: V8 / OQ-1 / OQ-5 initial publish. The user explicitly requests PUBLISH 0.1.0 against a draft spec at 0.0.1-draft. The drafter strips -draft, sets Version: 0.1.0 / Status: published, freezes numbering, and writes a CHANGELOG.md sibling with an aggregate ### Added summary line (OQ-5 default for initial publish). The drafter's version-bump-json reads kind: publish-initial."

prompt_file: prompt.md

mode_kind: update
spec_kind: product

workspace:
  isolation: copy-tree
  inputs_dir: inputs/
  golden_dir: golden/
  steps:
    - kind: git_init
    - kind: copy_tree
      src: inputs/
      dest: .
    - kind: copy_tree
      src: ../../../../../agent-packs/spec-author/.github/agents
      dest: .github/agents
    - kind: copy_tree
      src: ../../../../../agent-packs/spec-author/.github/skills
      dest: .github/skills

teardown:
  policy: delete-on-pass

expected:
  artifacts:
    - id: specification
      path_pattern: "^docs/specs/quick-toggle\\.md$"
      required: true
    - id: changelog
      path_pattern: "^docs/specs/CHANGELOG\\.md$"
      required: true
    - id: spec-review
      path_pattern: "^\\.spec-author/sessions/[^/]+/artifacts/spec-review\\.md$"
      required: true
  invocations:
    context-detective: { min: 1, max: 2 }
    prd-interviewer:   { min: 0, max: 0 }
    prd-drafter:       { min: 1, max: 2 }
    prd-critic:        { min: 1, max: 2 }
  rubric_targets:
    "artifact:specification": "^docs/specs/quick-toggle\\.md$"
    "artifact:changelog":     "^docs/specs/CHANGELOG\\.md$"
  rubric_overrides:
    publish-transition:        { severity: info }
    publish-initial-changelog: { severity: info }
    no-silent-publish:         { severity: info }

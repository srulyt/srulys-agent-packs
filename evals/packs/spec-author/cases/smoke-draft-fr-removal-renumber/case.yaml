id: smoke-draft-fr-removal-renumber
pack: spec-author
description: "F4 draft-branch regression guard: remove FR-03 from a 5-FR draft, renumber FR-04→FR-03 and FR-05→FR-04, atomically update every cross-reference (AC sub-IDs, R-NN mitigation prose, OQ pointers), record the operation in cross-ref-audit-json with deletes={FR-03} and renumbers={FR-04→FR-03, FR-05→FR-04}, leave NO [Deprecated]/[Removed] stub, write NO CHANGELOG entry (V3: drafts do not log)."

prompt_file: prompt.md

mode_kind: update
spec_kind: product

workspace:
  isolation: copy-tree
  inputs_dir: inputs/
  golden_dir: golden/
  steps:
    - kind: git_init
    - kind: copy_tree
      src: inputs/
      dest: .
    - kind: copy_tree
      src: ../../../../../agent-packs/spec-author/.github/agents
      dest: .github/agents
    - kind: copy_tree
      src: ../../../../../agent-packs/spec-author/.github/skills
      dest: .github/skills

teardown:
  policy: delete-on-pass

expected:
  artifacts:
    - id: specification
      path_pattern: "^docs/specs/notif-prefs\\.md$"
      required: true
    - id: spec-review
      path_pattern: "^\\.spec-author/sessions/[^/]+/artifacts/spec-review\\.md$"
      required: true
    - id: changelog
      # V3: no CHANGELOG entry on draft removals.
      path_pattern: "^.+/CHANGELOG\\.md$"
      required: false
      forbidden: true
  invocations:
    prd-drafter: { min: 1, max: 2 }
    prd-critic:  { min: 1, max: 2 }
  artifact_content_assertions:
    - artifact: specification
      must_match:
        # FR-03 is now the renumbered ex-FR-04 (quiet-hours).
        - "###\\s+FR-03\\s+— Quiet-hours window"
        - "###\\s+FR-04\\s+— Test-notification button"
        # AC IDs reflect new parents.
        - "\\*\\*AC-03\\.1\\*\\*"
        - "\\*\\*AC-03\\.2\\*\\*"
        - "\\*\\*AC-04\\.1\\*\\*"
        # Risks point at new IDs.
        - "FR-03\\)"  # quiet-hours risk now references FR-03
        - "FR-04\\)"  # test-button risk now references FR-04
      must_not_match:
        # No deprecation stub.
        - "(?i)\\[Deprecated"
        - "(?i)\\[Removed"
        # No dangling references to FR-03's old "muted badge"
        # content or to FR-05 (which became FR-04).
        - "muted badge"
        - "###\\s+FR-05"
        # No FR-03 retention as the inline-preview FR.
        - "Inline preview of muted channels"
  agent_output_overrides:
    prd-drafter:
      must_contain_sections:
        - draft-summary
        - section-decisions-json
        - spec-path
        - cross-ref-audit-json
        - ready-for-review
      json_block_assertions:
        cross-ref-audit-json:
          - '"FR-03" in deletes'
          - '"FR-04" in renumbers and renumbers["FR-04"] == "FR-03"'
          - '"FR-05" in renumbers and renumbers["FR-05"] == "FR-04"'
          - 'len(orphaned_references) == 0'
    prd-critic:
      json_block_assertions:
        findings-json:
          # d6.removal-by-status MUST NOT fire — drafter took the
          # correct draft branch. If it does fire, the drafter
          # left a stub or a numbering gap.
          - 'not any("d6.removal-by-status" in f.get("rubric","").lower() or "removal-by-status" in f.get("issue","").lower() for f in findings)'
  rubric_targets:
    "artifact:specification": "^docs/specs/notif-prefs\\.md$"
  rubric_overrides:
    id-stability:           { severity: error }
    cross-ref-integrity:    { severity: error }
    versioning-no-mid-draft-bump: { severity: warn }
    versioning-no-mid-draft-changelog: { severity: error }

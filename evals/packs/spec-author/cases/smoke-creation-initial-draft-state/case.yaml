id: smoke-creation-initial-draft-state
pack: spec-author
description: "Smoke test: V2 initial-draft state. A newly created spec lands at Status: draft, Version: 0.0.1-draft. No CHANGELOG.md is written. The drafter's version-bump-json reads kind: none-still-draft. The orchestrator emits a spec-status block and a pre-merge-reminder (since status==draft AND mutated_this_turn==true). Iteration-1 rubrics ship at severity: info per the standing critic rules."

prompt_file: prompt.md

mode_kind: creation
spec_kind: product

workspace:
  isolation: copy-tree
  inputs_dir: inputs/
  golden_dir: golden/
  steps:
    - kind: git_init
    - kind: copy_tree
      src: inputs/
      dest: .
    - kind: copy_tree
      src: ../../../../../agent-packs/spec-author/.github/agents
      dest: .github/agents
    - kind: copy_tree
      src: ../../../../../agent-packs/spec-author/.github/skills
      dest: .github/skills

teardown:
  policy: delete-on-pass

expected:
  artifacts:
    - id: specification
      path_pattern: "^docs/specs/quick-toggle\\.md$"
      required: true
    - id: spec-review
      path_pattern: "^\\.spec-author/sessions/[^/]+/artifacts/spec-review\\.md$"
      required: true
    - id: changelog
      path_pattern: "^.+/CHANGELOG\\.md$"
      required: false
      forbidden: true
  invocations:
    context-detective: { min: 1, max: 2 }
    prd-interviewer:   { min: 0, max: 0 }
    prd-drafter:       { min: 1, max: 2 }
    prd-critic:        { min: 1, max: 2 }
  rubric_targets:
    "artifact:specification": "^docs/specs/quick-toggle\\.md$"
  rubric_overrides:
    versioning-initial-state: { severity: info }
    versioning-no-mid-draft-changelog: { severity: info }

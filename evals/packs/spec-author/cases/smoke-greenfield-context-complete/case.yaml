id: smoke-greenfield-context-complete
pack: spec-author
description: "Smoke test: greenfield creation mode, context complete, Stop A path only. The detective finds no must_fill gaps, surfaces a proposed structure, the scripted user replies APPROVE on the first ask, the drafter writes specification.md, the critic scores it. Asserts the four-agent flow (orchestrator → detective → drafter → critic), the one-shot Stop A approval (no Stop B), and the expected artefact set (no interview-questions.md, no CHANGELOG.md)."

prompt_file: prompt.md

mode_kind: creation

workspace:
  isolation: copy-tree
  inputs_dir: inputs/
  golden_dir: golden/
  steps:
    - kind: git_init
    - kind: copy_tree
      src: inputs/
      dest: .
    # Stage the SUT's own agents and skills so Copilot CLI can
    # discover them when the workspace is the cwd.
    - kind: copy_tree
      src: ../../../../../agent-packs/spec-author/.github/agents
      dest: .github/agents
    - kind: copy_tree
      src: ../../../../../agent-packs/spec-author/.github/skills
      dest: .github/skills

teardown:
  policy: delete-on-pass

scripted_user:
  - on_phase: awaiting-structure-approval
    reply: "APPROVE"

expected:
  artifacts:
    - id: discovery
      path_pattern: "^\\.spec-author/sessions/[^/]+/artifacts/discovery\\.json$"
      required: true
    - id: context-pack
      path_pattern: "^\\.spec-author/sessions/[^/]+/artifacts/context-pack\\.md$"
      required: true
    - id: specification
      path_pattern: "^\\.spec-author/sessions/[^/]+/artifacts/specification\\.md$"
      required: true
    - id: spec-review
      path_pattern: "^\\.spec-author/sessions/[^/]+/artifacts/spec-review\\.md$"
      required: true
    - id: interview-questions
      path_pattern: "^\\.spec-author/sessions/[^/]+/artifacts/interview-questions\\.md$"
      required: false
      forbidden: true
    - id: changelog
      path_pattern: "^\\.spec-author/sessions/[^/]+/artifacts/CHANGELOG\\.md$"
      required: false
      forbidden: true
  invocations:
    context-detective: { min: 1, max: 2 }
    prd-interviewer:   { min: 0, max: 0 }
    prd-drafter:       { min: 1, max: 2 }
    prd-critic:        { min: 1, max: 2 }
  rubric_targets:
    "artifact:specification": "^\\.spec-author/sessions/[^/]+/artifacts/specification\\.md$"
  rubric_overrides:
    mandatory-coverage: { severity: error }
    format-compliance:  { severity: warn }
    content-quality:    { severity: warn }

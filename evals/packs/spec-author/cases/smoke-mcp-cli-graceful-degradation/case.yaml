id: smoke-mcp-cli-graceful-degradation
pack: spec-author
description: "Validates the MCP/CLI discovery graceful-degradation contract. Same product topic as smoke-greenfield-context-complete, but the scripted environment exposes ZERO MCP tools and the workspace's .github/copilot-instructions.md (fixture in inputs/) declares none. The user prompt explicitly says \"we usually have the GitHub MCP\" so the detective must record an unmet expectation AND set graceful_degradation: true rather than hard-failing."

prompt_file: prompt.md

mode_kind: creation
spec_kind: product

workspace:
  isolation: copy-tree
  inputs_dir: inputs/
  golden_dir: golden/
  steps:
    - kind: git_init
    - kind: copy_tree
      src: inputs/
      dest: .
    - kind: copy_tree
      src: ../../../../../agent-packs/spec-author/.github/agents
      dest: .github/agents
    - kind: copy_tree
      src: ../../../../../agent-packs/spec-author/.github/skills
      dest: .github/skills

teardown:
  policy: delete-on-pass

harness_overrides:
  disabled_tools:
    - "mcp_*"

expected:
  artifacts:
    - id: discovery
      path_pattern: "^\\.spec-author/sessions/[^/]+/artifacts/discovery\\.json$"
      required: true
    - id: specification
      path_pattern: "^docs/specs/digest\\.md$"
      required: true
    - id: spec-review
      path_pattern: "^\\.spec-author/sessions/[^/]+/artifacts/spec-review\\.md$"
      required: true
  artifact_content_assertions:
    - artifact: discovery
      must_match:
        - "\"graceful_degradation\"\\s*:\\s*true"
        - "\"mcps_detected\"\\s*:\\s*\\[\\s*\\]"
      must_contain_any:
        - "expected: github-mcp"
        - "github-mcp"
  invocations:
    context-detective: { min: 1, max: 2 }
    prd-interviewer:   { min: 0, max: 1 }
    prd-drafter:       { min: 1, max: 2 }
    prd-critic:        { min: 1, max: 2 }
  rubric_targets:
    "artifact:specification": "^docs/specs/digest\\.md$"
  rubric_overrides:
    mandatory-coverage: { severity: error }

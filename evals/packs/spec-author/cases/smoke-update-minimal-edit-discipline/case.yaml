id: smoke-update-minimal-edit-discipline
pack: spec-author
description: "Regression guard for minimal-edit discipline (F1–F10). Fixture is a prior spec with stylistically imperfect (but technically correct) prose; user request adds ONE FR. Asserts: drafter emits edit-audit-json with counts.modify <= 1 and counts.add >= 1; the diff against the prior spec touches only the new FR's section, the Document Information block, the 'Changes since vN' preamble, and the CHANGELOG; critic scores D10 >= 0.9 with zero blocker D10 findings."

prompt_file: prompt.md

mode_kind: update
spec_kind: technical

workspace:
  isolation: copy-tree
  inputs_dir: inputs/
  golden_dir: golden/
  steps:
    - kind: git_init
    - kind: copy_tree
      src: inputs/
      dest: .
    - kind: copy_tree
      src: ../../../../../agent-packs/spec-author/.github/agents
      dest: .github/agents
    - kind: copy_tree
      src: ../../../../../agent-packs/spec-author/.github/skills
      dest: .github/skills

teardown:
  policy: delete-on-pass

expected:
  artifacts:
    - id: specification
      path_pattern: "^docs/specs/digest\\.md$"
      required: true
    - id: changelog
      path_pattern: "^docs/specs/CHANGELOG\\.md$"
      required: true
    - id: spec-review
      path_pattern: "^\\.spec-author/sessions/[^/]+/artifacts/spec-review\\.md$"
      required: true
  invocations:
    context-detective: { min: 1, max: 2 }
    prd-interviewer:   { min: 0, max: 1 }
    prd-drafter:       { min: 1, max: 2 }
    prd-critic:        { min: 1, max: 2 }
  agent_output_overrides:
    prd-drafter:
      must_contain_sections:
        - draft-summary
        - section-decisions-json
        - spec-path
        - changelog-path
        - version-bump-json
        - edit-audit-json
        - ready-for-review
      # Minimal-edit assertions on the audit payload itself.
      json_block_assertions:
        edit-audit-json:
          - 'counts.add >= 1'
          - 'counts.modify <= 1'
          - 'counts.reorder == 0'
          - 'counts.rename == 0'
          - 'len(preserved_unchanged_sections) >= 3'
          - 'all(e.reason in ["correctness","requested","missing","mechanics"] for e in edits)'
  artifact_content_assertions:
    - artifact: specification
      # Bait spans MUST survive verbatim from the fixture: the user did
      # NOT ask for any change to these, so they must be preserved
      # byte-for-byte. If the drafter rewrites them, this case fails.
      # (Patterns are regex-escaped literals — `must_match` is the
      # supported assertion key for verbatim survival; the harness
      # has no `must_contain_verbatim` key.)
      must_match:
        - "Updates:\\s*v1\\.0"
        - "Changes since v1"
        - "Workspace members miss important changes across squads\\. Scrolling individual channels to find what matters takes too long\\."
        - "Built on the existing `workspace-events` Kafka topic\\. No new datastore\\."
        - "PM      \\| Daily summary across squads\\. \\| < 2 min to know what to follow up on\\. \\|"
    - artifact: changelog
      must_match:
        - "###\\s*Added"
  rubric_targets:
    "artifact:specification": "^docs/specs/digest\\.md$"
    "artifact:changelog":     "^docs/specs/CHANGELOG\\.md$"
  rubric_overrides:
    # D10 lives at info severity in the pack spec for iteration 1, but
    # this case is the regression guard for it — escalate so a drift
    # here is loud.
    edit-minimalism:
      severity: warn
      threshold: 0.9
    # Existing dimensions stay at their base severity but we record
    # the targets that matter for this specific failure mode.
    id-stability:           { severity: error }
    versioning-correctness: { severity: error }

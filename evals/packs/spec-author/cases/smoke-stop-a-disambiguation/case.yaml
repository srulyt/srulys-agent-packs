id: smoke-stop-a-disambiguation
pack: spec-author
description: "Validates the C4 Stop A binary-disambiguation loop and the C5 partial-answer fallback in a single end-to-end run. The detective initially reports P0 gaps so Stop B fires; the scripted user replies with answers that cover only some P0s, exercising the one-shot interview retry; the user's second reply still leaves one P0 unanswered, so the drafter proceeds with a [TBD] placeholder; at Stop A the user first replies with an ambiguous string ('looks fine'), then 'maybe?', then finally 'APPROVE', exercising two disambiguation re-prompts. Asserts: prd-interviewer runs exactly once; interview_retries == 1; stop_a_disambiguation_attempts == 2; the final specification.md contains a [TBD - interview question .* unanswered] placeholder and an Open Questions entry referencing the unanswered P0; no CHANGELOG.md is written (creation mode)."

prompt_file: prompt.md

mode_kind: creation

workspace:
  isolation: copy-tree
  inputs_dir: inputs/
  golden_dir: golden/
  steps:
    - kind: git_init
    - kind: copy_tree
      src: inputs/
      dest: .
    - kind: copy_tree
      src: ../../../../../agent-packs/spec-author/.github/agents
      dest: .github/agents
    - kind: copy_tree
      src: ../../../../../agent-packs/spec-author/.github/skills
      dest: .github/skills

teardown:
  policy: delete-on-pass

# Scripted replies are matched in order against the orchestrator's successive
# `awaiting-*` parks. The harness pops one entry per park.
# Orchestrator parks twice at awaiting-interview-answers (initial + C5 retry)
# and three times at awaiting-structure-approval (two ambiguous + one APPROVE).
scripted_user:
  - on_phase: awaiting-interview-answers
    reply_file: inputs/interview-answers-partial.md
  - on_phase: awaiting-interview-answers
    reply: "I don't have a good answer for the rollout-risk question, sorry. Skip it."
  - on_phase: awaiting-structure-approval
    reply: "looks fine"
  - on_phase: awaiting-structure-approval
    reply: "maybe?"
  - on_phase: awaiting-structure-approval
    reply: "APPROVE"

expected:
  artifacts:
    - id: discovery
      path_pattern: "^\\.spec-author/sessions/[^/]+/artifacts/discovery\\.json$"
      required: true
    - id: context-pack
      path_pattern: "^\\.spec-author/sessions/[^/]+/artifacts/context-pack\\.md$"
      required: true
    - id: interview-questions
      path_pattern: "^\\.spec-author/sessions/[^/]+/artifacts/interview-questions\\.md$"
      required: true
    - id: interview-answers
      path_pattern: "^\\.spec-author/sessions/[^/]+/context/interview-answers\\.md$"
      required: true
    - id: state
      path_pattern: "^\\.spec-author/sessions/[^/]+/state\\.json$"
      required: true
    - id: specification
      path_pattern: "^\\.spec-author/sessions/[^/]+/artifacts/specification\\.md$"
      required: true
    - id: spec-review
      path_pattern: "^\\.spec-author/sessions/[^/]+/artifacts/spec-review\\.md$"
      required: true
    - id: changelog
      path_pattern: "^\\.spec-author/sessions/[^/]+/artifacts/CHANGELOG\\.md$"
      required: false
      forbidden: true

  invocations:
    # Detective runs twice (initial + post-interview); C5 retry does NOT
    # re-invoke the detective, only the user.
    context-detective: { min: 2, max: 2 }
    # Interviewer runs exactly once. The orchestrator parks twice on
    # `awaiting-interview-answers` (once after the initial interview,
    # then again for the C5 partial-answer retry where the scripted
    # user is re-prompted via the second `awaiting-interview-answers`
    # entry in `scripted_user` above), but the second park does NOT
    # re-invoke the prd-interviewer agent — the retry is a user-only
    # re-prompt that the orchestrator handles inline using the
    # already-generated interview-questions.md. Two parks ≠ two
    # invocations.
    prd-interviewer:   { min: 1, max: 1 }
    prd-drafter:       { min: 1, max: 2 }
    prd-critic:        { min: 1, max: 2 }

  # Typed state-file invariants. Consumed by L3-state-assertions
  # (see eval_engine/docs/04-case-and-workspace-schema.md). Asserts the
  # C4 disambiguation counter (== 2 attempts) and the C5 retry counter
  # (interview_retries == 1), plus the terminal phase and the gate flags.
  state_assertions:
    - artifact: state
      equals:
        stop_a_disambiguation_attempts: 2
        interview_retries: 1
        interview_complete: true
        structure_approved: true
      matches:
        phase: "^complete(-with-warnings)?$"

  # Markdown content invariants. Consumed by L3-artifact-content. Only
  # non-state checks live here; state.json invariants are above under
  # state_assertions.
  artifact_content_assertions:
    - artifact: specification
      must_match:
        - "\\[TBD\\s*[-—]\\s*interview question\\s+\\S+\\s+unanswered\\]"
        - "(?i)open questions"
    - artifact: interview-questions
      must_match:
        - "(?i)P0"

  rubric_targets:
    "artifact:specification": "^\\.spec-author/sessions/[^/]+/artifacts/specification\\.md$"

  rubric_overrides:
    mandatory-coverage:    { severity: error }
    gated-appropriateness: { severity: warn }
    content-quality:       { severity: info }   # [TBD] degrades quality by design

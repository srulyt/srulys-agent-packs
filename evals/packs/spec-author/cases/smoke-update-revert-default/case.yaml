id: smoke-update-revert-default
pack: spec-author
description: "F3 regression guard: per-statement REVERT-default gate. Prior spec contains two deliberately ugly Problem-Statement sentences (typos + awkward gerund-heavy phrasing). User asks for ONE new AC. Asserts: revised spec preserves the typos and awkward sentence byte-for-byte (REVERT default beats stylistic polish); edit-audit-json contains exactly one sentence-level entry for the new AC; critic verdict == pass; if the drafter polished any ugly sentence, the critic's D10 per-statement findings MUST emit fix strings of the form 'revert to prior wording at'."

prompt_file: prompt.md

mode_kind: update
spec_kind: technical

workspace:
  isolation: copy-tree
  inputs_dir: inputs/
  golden_dir: golden/
  steps:
    - kind: git_init
    - kind: copy_tree
      src: inputs/
      dest: .
    - kind: copy_tree
      src: ../../../../../agent-packs/spec-author/.github/agents
      dest: .github/agents
    - kind: copy_tree
      src: ../../../../../agent-packs/spec-author/.github/skills
      dest: .github/skills

teardown:
  policy: delete-on-pass

expected:
  artifacts:
    - id: specification
      path_pattern: "^docs/specs/digest\\.md$"
      required: true
    - id: spec-review
      path_pattern: "^\\.spec-author/sessions/[^/]+/artifacts/spec-review\\.md$"
      required: true
  invocations:
    prd-drafter: { min: 1, max: 2 }
    prd-critic:  { min: 1, max: 2 }
  artifact_content_assertions:
    - artifact: specification
      # Bait sentences MUST survive verbatim — typos and all.
      must_match:
        - "Workspace memebers miss important changes accross squads"
        - "the scrolling of individual channels in order to be finding what matters is taking too much of the time"
      must_not_match:
        # Negative-control: if these "fixed" forms appear, the
        # drafter polished and F3 has regressed.
        - "Workspace members miss important changes across squads"
        - "Scrolling individual channels to find what matters takes too long"
  agent_output_overrides:
    prd-drafter:
      must_contain_sections:
        - draft-summary
        - section-decisions-json
        - spec-path
        - edit-audit-json
        - ready-for-review
      json_block_assertions:
        edit-audit-json:
          # Exactly one logical edit: the new AC. Sentence-level
          # locator (per F5) — paragraph-level locator is insufficient.
          - 'counts.add >= 1'
          - 'counts.modify == 0'
          - 'len([e for e in edits if "AC-04" in e.locator or "AC-4" in e.locator]) == 1'
          # No edit's locator resolves to Problem Statement.
          - 'not any("Problem Statement" in e.locator for e in edits)'
    prd-critic:
      json_block_assertions:
        findings-json:
          # No D10 per-statement findings fired (drafter behaved).
          # If they did fire, every fix string must use the REVERT
          # phrasing — that is the contract on the critic side.
          - 'all("revert to prior wording at" in f.get("fix","").lower() for f in findings if "per-statement" in f.get("rubric","").lower() or "stylistic" in f.get("issue","").lower())'
  rubric_targets:
    "artifact:specification": "^docs/specs/digest\\.md$"
  rubric_overrides:
    edit-minimalism:
      severity: warn
      threshold: 0.9

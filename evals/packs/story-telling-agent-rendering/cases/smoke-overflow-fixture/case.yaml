id: smoke-overflow-fixture
pack: story-telling-agent-rendering
description: |
  F1 regression smoke test: a hand-crafted deck-spec.json containing
  a slide with deliberately overflowing body text (>30 words, narrow
  textbox) is fed to the rebuilt @deck-builder. The @deck-critic
  must detect the overflow via the new Pillow real-metric pipeline
  in check_pptx.py and return verdict=revise with
  blocking-findings including "overflow_violations".

prompt_file: prompt.md

prompt_template_vars:
  fixture_name: "overflow"

workspace:
  isolation: copy-tree
  inputs_dir: inputs/
  golden_dir: golden/
  steps:
    - kind: git_init
    - kind: copy_tree
      src: inputs/
      dest: .
    - kind: copy_tree
      src: ../../../../../agent-packs/story-telling-agent/.github/agents
      dest: .github/agents
    - kind: copy_tree
      src: ../../../../../agent-packs/story-telling-agent/.github/skills
      dest: .github/skills
    - kind: copy_tree
      src: ../../../../../agent-packs/story-telling-agent/.story-telling-stm
      dest: .story-telling-stm
    - kind: copy_tree
      src: fixtures/
      dest: .story-telling-stm/runs/smoke-overflow/agents/deck-builder/

teardown:
  policy: delete-on-pass

expected:
  artifacts:
    - id: structural-report
      path_pattern: "^\\.story-telling-stm/runs/[^/]+/agents/deck-critic/structural-report\\.json$"
      required: true
    - id: qa-report
      path_pattern: "^\\.story-telling-stm/runs/[^/]+/agents/deck-critic/qa-report\\.json$"
      required: true
  invocations:
    deck-builder: { min: 1, max: 2 }
    deck-critic:  { min: 1, max: 2 }
  rubric_targets:
    "artifact:structural-report": "^\\.story-telling-stm/runs/[^/]+/agents/deck-critic/structural-report\\.json$"
    "artifact:critic-verdict": "^\\.story-telling-stm/runs/[^/]+/agents/deck-critic/qa-report\\.json$"

  # Verdict assertion: the critic MUST flag overflow_violations.
  expectations:
    - kind: contract-fence
      output_contract: critic-verdict
      must_match: "overflow_violations"
    - kind: must-not-match
      output_contract: status
      pattern: "^pass$"

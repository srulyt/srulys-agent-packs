id: smoke-low-contrast-fixture
pack: story-telling-agent-rendering
description: |
  F4 regression smoke test: a deck-spec with a slide that uses a
  light-grey text on a light background (text_on_light = #BBBBBB
  on background_light = #F5F6FA, contrast ratio < 2:1). The
  rebuilt @deck-critic must flag this via `contrast_violations`
  using the new theme-resolved contrast pipeline (no longer
  silently downgrading to `contrast_unresolved`).

prompt_file: prompt.md

workspace:
  isolation: copy-tree
  inputs_dir: inputs/
  golden_dir: golden/
  steps:
    - kind: git_init
    - kind: copy_tree
      src: inputs/
      dest: .
    - kind: copy_tree
      src: ../../../../../agent-packs/story-telling-agent/.github/agents
      dest: .github/agents
    - kind: copy_tree
      src: ../../../../../agent-packs/story-telling-agent/.github/skills
      dest: .github/skills
    - kind: copy_tree
      src: ../../../../../agent-packs/story-telling-agent/.story-telling-stm
      dest: .story-telling-stm
    - kind: copy_tree
      src: fixtures/
      dest: .story-telling-stm/runs/smoke-low-contrast/agents/deck-builder/

teardown:
  policy: delete-on-pass

expected:
  artifacts:
    - id: structural-report
      path_pattern: "^\\.story-telling-stm/runs/[^/]+/agents/deck-critic/structural-report\\.json$"
      required: true
  invocations:
    deck-builder: { min: 1, max: 2 }
    deck-critic:  { min: 1, max: 2 }
  rubric_targets:
    "artifact:structural-report": "^\\.story-telling-stm/runs/[^/]+/agents/deck-critic/structural-report\\.json$"
    "artifact:critic-verdict": "^\\.story-telling-stm/runs/[^/]+/agents/deck-critic/qa-report\\.json$"
  expectations:
    - kind: contract-fence
      output_contract: critic-verdict
      must_match: "contrast_violations"
    - kind: must-not-match
      output_contract: status
      pattern: "^pass$"

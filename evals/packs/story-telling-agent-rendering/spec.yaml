# Pack spec for story-telling-agent (rendering subsystem rebuild).
#
# Encodes the contracts the in-scope agents (deck-builder, deck-critic)
# declare in their .agent.md frontmatter and "File Access Boundaries"
# sections AFTER the 2026-05-04 rendering-rebuild. The story-orchestrator
# and story-strategist agents are out-of-scope for this pack and are
# NOT redefined here.
#
# All rubrics pinned at severity:info per first-iteration policy
# (eval_engine/docs §rubrics; promotion to warn/blocker requires
# baseline runs).

pack: story-telling-agent-rendering
orchestrator: story-orchestrator

models:
  story-orchestrator: claude-sonnet-4.6
  story-strategist:   claude-sonnet-4.6
  deck-builder:       claude-sonnet-4.6
  deck-critic:        claude-sonnet-4.6
  judge:              claude-opus-4.7

loops:
  max_orchestrator_turns: 80

flow:
  ordering:
    - [deck-builder, deck-critic]
  no_unexpected_agents: true

agents:
  - name: deck-builder
    invocations: { min: 1, max: 3, must_complete: true }
    allowed_tools: [read, search, write, execute]
    write_scope_allow:
      - "^\\.story-telling-stm/runs/[^/]+/agents/deck-builder/.*"
    read_scope_allow:
      - "^\\.story-telling-stm/runs/[^/]+/.*"
      - "^\\.github/skills/.*"
      - "^\\.story-telling-stm/schemas/.*"
    scope_deny:
      - "^_eval/"
      - "^\\.git/"
      - "^\\.story-telling-stm/runs/[^/]+/agents/(story-strategist|deck-critic|story-orchestrator)/"
    prompt_contract:
      required_sections:
        - "Invocation Guard"
        - "File Access Boundaries"
        - "Skills to Load"
        - "Output Contract"
      required_fields:
        - "session"
    output_contract:
      must_contain_sections:
        - "status"
        - "artifacts-json"
        - "builder-summary"
    token_budget_max: 100000
    no_subagent_reinvocation: true

  - name: deck-critic
    invocations: { min: 1, max: 3, must_complete: true }
    allowed_tools: [read, search, write, execute]
    write_scope_allow:
      - "^\\.story-telling-stm/runs/[^/]+/agents/deck-critic/.*"
    read_scope_allow:
      - "^\\.story-telling-stm/runs/[^/]+/.*"
      - "^\\.github/skills/.*"
    scope_deny:
      - "^_eval/"
      - "^\\.git/"
      - "^\\.story-telling-stm/runs/[^/]+/agents/(story-strategist|deck-builder|story-orchestrator)/"
    prompt_contract:
      required_sections:
        - "Invocation Guard"
        - "File Access Boundaries"
        - "Skills to Load"
        - "Verdict Logic"
      required_fields:
        - "session"
    output_contract:
      must_contain_sections:
        - "status"
        - "qa-report-json"
        - "critic-verdict"
        - "palette-preflight"
        - "styled-deck-policy"
        - "top-fixes-json"
    token_budget_max: 80000
    no_subagent_reinvocation: true

  - name: story-orchestrator
    invocations: { min: 1, max: 1, must_complete: true }
    allowed_tools: [read, search, write, agent]
    write_scope_allow:
      - "^\\.story-telling-stm/.*"
    read_scope_allow:
      - "^\\.story-telling-stm/.*"
      - "^\\.github/skills/.*"
    scope_deny:
      - "^_eval/"
      - "^\\.git/"
    token_budget_max: 60000
    no_subagent_reinvocation: false

rubrics:
  # Per-finding rubrics for the rendering rebuild. ALL severity:info
  # for the first iteration — promotion to warn/blocker requires a
  # baseline run after the pack stabilises.
  - id: f1-overflow-detection-real-metrics
    apply_to: artifact:structural-report
    severity: info
  - id: f4-contrast-theme-resolved
    apply_to: artifact:structural-report
    severity: info
  - id: f5-style-dispatch-correct
    apply_to: artifact:deck-spec
    severity: info
  - id: f7-bg-classification-saturation-aware
    apply_to: artifact:structural-report
    severity: info
  - id: f8-dark-light-run-thresholds
    apply_to: artifact:structural-report
    severity: info
  - id: f9-tokens-driven
    apply_to: artifact:deck-spec
    severity: info
  - id: f11-body-word-max-30
    apply_to: artifact:structural-report
    severity: info
  - id: g1-palette-preflight
    apply_to: artifact:critic-verdict
    severity: info
  - id: oq5-render-unverified-on-styled
    apply_to: artifact:critic-verdict
    severity: info
  - id: builder-summary-contract-present
    apply_to: artifact:builder-summary
    severity: info
  - id: critic-verdict-contract-present
    apply_to: artifact:critic-verdict
    severity: info
  - id: format-compliance
    apply_to: artifact:critic-verdict
    severity: info

loop_convergence:
  required_status: pass

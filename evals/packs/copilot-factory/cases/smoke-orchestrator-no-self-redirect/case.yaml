# smoke-orchestrator-no-self-redirect
#
# Regression coverage for the Layer-2 orchestrator override
# (Finding F1 of session 2026-05-05-7a3b9d12). The user issues a
# pack-improvement request in plain English WITHOUT prefixing
# `@copilot-factory`. The SUT IS `@copilot-factory` (the
# orchestrator) — so it must NOT redirect the user to re-issue with
# the prefix. It must run Phase 1 intake (or Session Recovery) and
# create a session.
#
# Assertion mechanism (per F3 caveat in improvement-analysis.md):
# the harness's loaders.py supports `expected.invocations`,
# `expected.artifacts`, `expected.state_assertions`, and
# `expected.artifact_content_assertions` — but NOT first-response
# substring assertions. We therefore detect the redirect-vs-intake
# behaviour indirectly:
#   1. `factory-architect: {min: 0, max: 0}` — guards against any
#      premature rebuild on first turn.
#   2. `expected.artifacts` requires the session's `state.json` and
#      `user-request.md` to exist — a redirect creates neither.
#   3. `state_assertions` on `state.json` pins `mode: "improvement"`
#      and `phase` in the legitimate intake/improve-analysis set.
#   4. `artifact_content_assertions.must_contain_any` on
#      `user-request.md` proves the orchestrator captured the
#      original prompt (mentions `spec-author` or `versioning`)
#      rather than recording a redirect dialogue.
#   5. `must_not_match` on `user-request.md` forbids the redirect
#      phrasings ("re-issue", "prefix with @copilot-factory",
#      "prepend @copilot-factory", "this work is owned by
#      @copilot-factory") in the captured user-request file as a
#      belt-and-suspenders check.
#
# Forbidden response substrings ("re-issue", "prefix with
# @copilot-factory", "prepend @copilot-factory", "this work is
# owned by @copilot-factory") are documented in golden/README.md
# for human reviewers; if the harness later gains a
# first-response-text assertion mechanism, lift them into a
# `response_assertions` block and remove this comment.

id: smoke-orchestrator-no-self-redirect
pack: copilot-factory
description: |
  Regression test for the orchestrator's repo-instruction override
  (Layer 2 of the @copilot-factory self-redirect bug fix). The user
  asks for pack-improvement work in plain English without the
  @copilot-factory prefix. The SUT IS @copilot-factory, so the first
  response must begin Phase 1 intake / Session Recovery, NOT redirect
  the user to re-issue the message with an @copilot-factory prefix.
  Severity is BLOCKER: regression here means the override clause has
  been weakened or removed.

prompt_file: prompt.md

workspace:
  isolation: copy-tree
  inputs_dir: inputs/
  golden_dir: golden/
  steps:
    - kind: git_init
    - kind: copy_tree
      src: inputs/
      dest: .
    - kind: copy_tree
      src: ../../../../../agent-packs/copilot-factory/.github/agents
      dest: .github/agents
    - kind: copy_tree
      src: ../../../../../.github/skills
      dest: .github/skills
    - kind: copy_tree
      src: ../../../../../.github/instructions
      dest: .github/instructions

teardown:
  policy: delete-on-pass

expected:
  artifacts:
    - id: session-state
      path_pattern: "^\\.copilot-factory/sessions/[^/]+/state\\.json$"
      required: true
    - id: user-request-saved
      path_pattern: "^\\.copilot-factory/sessions/[^/]+/context/user-request\\.md$"
      required: true
  invocations:
    factory-architect: { min: 0, max: 0 }
    factory-engineer:  { min: 0, max: 0 }
    factory-critic:    { min: 0, max: 1 }
  allowed_agent_types: [copilot-factory, factory-critic]
  state_assertions:
    - artifact: session-state
      equals:
        mode: "improvement"
      matches:
        phase: "^(intake|improve-analysis|design|review-arch|approval)$"
  artifact_content_assertions:
    - artifact: user-request-saved
      must_contain_any:
        - "spec-author"
        - "versioning"
        - "version"
      must_not_match:
        - "(?i)please\\s+re-issue"
        - "(?i)prefix\\s+with\\s+@?copilot-factory"
        - "(?i)prepend\\s+@?copilot-factory"
        - "(?i)this\\s+work\\s+is\\s+owned\\s+by\\s+@?copilot-factory"

id: smoke-create-issue-triage-pack
pack: copilot-factory
description: |
  Smoke test: ask copilot-factory to design and build a small 2-agent pack
  for issue triage. Verifies the four-agent flow (orchestrator → architect →
  engineer → critic), basic scope adherence, and that the architecture
  artifact lands at the expected path.

prompt_file: prompt.md

prompt_template_vars:
  feature: "issue triage"

workspace:
  isolation: copy-tree
  inputs_dir: inputs/
  golden_dir: golden/
  steps:
    - kind: git_init
    - kind: copy_tree
      src: inputs/
      dest: .
    # Stage the SUT's own agents and skills so Copilot CLI can discover
    # them when the workspace is the cwd. Without this the workspace is
    # an empty git repo and `copilot --agent copilot-factory` fails to
    # resolve the agent. Paths are relative to the case directory.
    - kind: copy_tree
      src: ../../../../../agent-packs/copilot-factory/.github/agents
      dest: .github/agents
    - kind: copy_tree
      src: ../../../../../.github/skills
      dest: .github/skills
    - kind: copy_tree
      src: ../../../../../.github/instructions
      dest: .github/instructions

teardown:
  policy: delete-on-pass

expected:
  artifacts:
    - id: architecture
      path_pattern: "^\\.copilot-factory/sessions/[^/]+/artifacts/architecture\\.md$"
      required: true
    - id: build-manifest
      path_pattern: "^\\.copilot-factory/sessions/[^/]+/artifacts/build-manifest\\.json$"
      required: true
    - id: pack-output
      path_pattern: "^agent-packs/[a-z0-9-]+/.*\\.agent\\.md$"
      required: true
  invocations:
    factory-architect: { min: 1, max: 2 }
    factory-engineer: { min: 1, max: 3 }
    factory-critic: { min: 1, max: 3 }
  rubric_targets:
    "artifact:architecture": "^\\.copilot-factory/sessions/[^/]+/artifacts/architecture\\.md$"

# Pack spec for copilot-factory.
#
# Encodes the contracts the four agents declare in their .agent.md
# front-matter and "File Access Boundaries" sections. Cases under
# evals/corpora/copilot-factory/ may override expectations per case.
#
# See eval_engine/docs/01-spec-schema.md (and 05-design-revisions-v2.md) for
# the full schema.

pack: copilot-factory
orchestrator: copilot-factory

models:
  copilot-factory: claude-sonnet-4.6
  factory-architect: claude-sonnet-4.6
  factory-critic: claude-sonnet-4.6
  factory-engineer: claude-sonnet-4.6
  judge: claude-opus-4.7

loops:
  max_orchestrator_turns: 60

flow:
  ordering:
    - [factory-architect, factory-engineer]
    - [factory-architect, factory-critic]
  no_unexpected_agents: true

agents:
  - name: factory-architect
    invocations: { min: 1, max: 3, must_complete: true }
    allowed_tools: [read, search, write]
    write_scope_allow:
      - "^\\.copilot-factory/sessions/[^/]+/artifacts/architecture\\.md$"
    read_scope_allow:
      - "^\\.copilot-factory/sessions/[^/]+/(context|artifacts|state)/.*"
      - "^\\.github/skills/.*"
      - "^agent-packs/.*"
    scope_deny:
      - "^_eval/"
      - "^\\.git/"
    prompt_contract:
      required_sections:
        - "Context"
      required_fields:
        - "user-request"
        - "session-id"
      forbidden_input: []
      forbidden_downstream: []
    output_contract:
      must_contain_sections:
        - "Architecture"
        - "Agents"
    token_budget_max: 80000
    no_subagent_reinvocation: true

  - name: factory-engineer
    invocations: { min: 1, max: 5, must_complete: true }
    allowed_tools: [read, search, write, execute]
    write_scope_allow:
      - "^agent-packs/[a-z0-9-]+/.*"
      - "^\\.copilot-factory/sessions/[^/]+/artifacts/build-manifest\\.json$"
    read_scope_allow:
      - "^\\.copilot-factory/sessions/[^/]+/.*"
      - "^\\.github/skills/.*"
      - "^agent-packs/.*"
    scope_deny:
      - "^_eval/"
      - "^\\.git/"
    prompt_contract:
      required_sections:
        - "Architecture"
        - "Output"
      required_fields:
        - "session-id"
    output_contract:
      must_contain_sections:
        - "Implementation"
    token_budget_max: 120000
    no_subagent_reinvocation: true

  - name: factory-critic
    invocations: { min: 1, max: 4, must_complete: true }
    allowed_tools: [read, search, write]
    write_scope_allow:
      - "^\\.copilot-factory/sessions/[^/]+/artifacts/(architecture|implementation)-review\\.md$"
    read_scope_allow:
      - "^\\.copilot-factory/sessions/[^/]+/.*"
      - "^agent-packs/.*"
      - "^\\.github/skills/.*"
    scope_deny:
      - "^_eval/"
      - "^\\.git/"
    prompt_contract:
      required_sections:
        - "Inputs"
      required_fields:
        - "session-id"
    output_contract:
      must_contain_sections:
        - "Verdict"
    token_budget_max: 80000
    no_subagent_reinvocation: true

rubrics:
  - id: coherence
    apply_to: artifact:architecture
    severity: info
  - id: completeness
    apply_to: artifact:architecture
    severity: info
  - id: faithfulness-to-input
    apply_to: artifact:architecture
    severity: info
  - id: format-compliance
    apply_to: artifact:architecture
    severity: info

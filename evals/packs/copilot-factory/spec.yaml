# Pack spec for copilot-factory.
#
# Encodes the contracts the four agents declare in their .agent.md
# front-matter and "File Access Boundaries" sections. Cases under
# evals/corpora/copilot-factory/ may override expectations per case.
#
# See eval_engine/docs/01-spec-schema.md (and 05-design-revisions-v2.md) for
# the full schema.

pack: copilot-factory
orchestrator: copilot-factory

# models: per-role model pinning.
#
# Convention (list-as-matrix):
#   - A scalar value pins that role to a single model (current behaviour
#     and the only form the loader accepts today). Example:
#         judge: claude-opus-4.7
#   - A list value declares a matrix axis: the harness Cartesian-products
#     all list-valued roles and emits one runs.jsonl line per combination,
#     so cross-model agreement / pack robustness can be measured. Example
#     (NOT YET LOADER-ENABLED):
#         judge: [claude-opus-4.7, gpt-5.5]
#
# Status: matrix expansion is gated on infra work tracked separately
# (loader + run.py changes). Until that lands, every value below MUST
# remain a scalar — list values will be rejected by the loader. See
# .copilot-factory/sessions/2026-05-03-e5f6a7b8/artifacts/infra-handoff.md
# for the runbook to enable matrix expansion. The run-record's `models`
# snapshot field (eval_engine/docs/03-rubric-and-results-schema.md) is
# how matrix points are grouped post-hoc.
models:
  copilot-factory: claude-sonnet-4.6
  factory-architect: claude-sonnet-4.6
  factory-critic: claude-sonnet-4.6
  factory-engineer: claude-sonnet-4.6
  judge: claude-opus-4.7

loops:
  max_orchestrator_turns: 60

flow:
  ordering:
    - [factory-architect, factory-engineer]
    - [factory-architect, factory-critic]
  no_unexpected_agents: true

agents:
  - name: factory-architect
    invocations: { min: 1, max: 3, must_complete: true }
    allowed_tools: [read, search, write]
    write_scope_allow:
      - "^\\.copilot-factory/sessions/[^/]+/artifacts/architecture\\.md$"
    read_scope_allow:
      - "^\\.copilot-factory/sessions/[^/]+/(context|artifacts|state)/.*"
      - "^\\.github/skills/.*"
      - "^agent-packs/.*"
    scope_deny:
      - "^_eval/"
      - "^\\.git/"
    prompt_contract:
      required_sections:
        - "Invocation Contract"
      required_fields:
        - "user-request"
        - "session"
      forbidden_input: []
      forbidden_downstream: []
    output_contract:
      must_contain_sections:
        - "architecture-summary"
        - "agents-json"
        - "eval-plan-json"
        - "open-questions"
        - "ready-for-review"
    token_budget_max: 80000
    no_subagent_reinvocation: true

  - name: factory-engineer
    invocations: { min: 1, max: 5, must_complete: true }
    allowed_tools: [read, search, write, execute]
    write_scope_allow:
      - "^agent-packs/[a-z0-9-]+/.*"
      - "^evals/packs/[a-z0-9-]+/.*"
      - "^\\.copilot-factory/sessions/[^/]+/artifacts/build-manifest\\.json$"
    read_scope_allow:
      - "^\\.copilot-factory/sessions/[^/]+/.*"
      - "^\\.github/skills/.*"
      - "^agent-packs/.*"
      - "^evals/.*"
    scope_deny:
      - "^_eval/"
      - "^\\.git/"
    prompt_contract:
      required_sections:
        - "Input Expectations"
        - "Output Contract"
      required_fields:
        - "session"
    output_contract:
      must_contain_sections:
        - "implementation-summary"
        - "files-created-json"
        - "ready-for-review"
    token_budget_max: 120000
    no_subagent_reinvocation: true

  - name: factory-critic
    invocations: { min: 1, max: 4, must_complete: true }
    allowed_tools: [read, search, write]
    write_scope_allow:
      - "^\\.copilot-factory/sessions/[^/]+/artifacts/(architecture|implementation)-review\\.md$"
      - "^\\.copilot-factory/sessions/[^/]+/artifacts/improvement-analysis\\.md$"
    read_scope_allow:
      - "^\\.copilot-factory/sessions/[^/]+/.*"
      - "^agent-packs/.*"
      - "^evals/.*"
      - "^\\.github/skills/.*"
    scope_deny:
      - "^_eval/"
      - "^\\.git/"
    prompt_contract:
      required_sections:
        - "Invocation Contract"
      required_fields:
        - "session"
        - "iteration-count"
    output_contract:
      must_contain_sections:
        - "verdict"
    token_budget_max: 80000
    no_subagent_reinvocation: true

  - name: copilot-factory
    invocations: { min: 1, max: 1, must_complete: true }
    allowed_tools: [read, search, write, agent]
    write_scope_allow:
      - "^\\.copilot-factory/.*"
    read_scope_allow:
      - "^\\.copilot-factory/.*"
      - "^\\.github/skills/.*"
      - "^\\.local/multi-agent-instructions\\.md$"
    scope_deny:
      - "^_eval/"
      - "^\\.git/"
      - "^agent-packs/"
      - "^evals/packs/"
    prompt_contract:
      required_sections:
        - "Hard Delegation Rule (STOP-and-delegate)"
        - "How to Delegate (Task Tool Mechanics)"
        - "Mandatory Delegation"
        - "Must NOT"
      required_fields: []
    token_budget_max: 60000
    no_subagent_reinvocation: false

rubrics:
  - id: coherence
    apply_to: artifact:architecture
    severity: info
  - id: completeness
    apply_to: artifact:architecture
    severity: info
  - id: faithfulness-to-input
    apply_to: artifact:architecture
    severity: info
  - id: format-compliance
    apply_to: artifact:architecture
    severity: warn
    threshold: 0.7

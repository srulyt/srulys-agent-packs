id: smoke-revision-then-approve
pack: story-telling-agent
description: "Tests the proposal-feedback loop. User rejects the first proposal with specific feedback, story-strategist revises, user then approves. Verifies proposal_iteration increments correctly and Stop-B is enforced (no build before APPROVED)."

prompt_file: prompt.md

workspace:
  isolation: copy-tree
  inputs_dir: inputs/
  golden_dir: golden/
  steps:
    - kind: git_init
    - kind: copy_tree
      src: inputs/
      dest: .
    - kind: copy_tree
      src: ../../../../../agent-packs/story-telling-agent/.github/agents
      dest: .github/agents
    - kind: copy_tree
      src: ../../../../../agent-packs/story-telling-agent/.github/skills
      dest: .github/skills

teardown:
  policy: delete-on-pass

limits:
  web_invocations_max: 2

expected:
  artifacts:
    - id: state
      path_pattern: "^\\.story-telling-stm/runs/[^/]+/state\\.json$"
      required: true
    - id: proposal
      path_pattern: "^\\.story-telling-stm/runs/[^/]+/agents/story-strategist/proposal\\.md$"
      required: true
    - id: deck-pptx
      path_pattern: "^\\.story-telling-stm/runs/[^/]+/agents/deck-builder/output\\.pptx$"
      required: true
  invocations:
    story-strategist: { min: 2, max: 3 }
    deck-builder: { min: 1, max: 2 }
    deck-critic: { min: 1, max: 2 }
  state_assertions:
    proposal_iteration_min: 2
    user_approved: true
  rubric_targets:
    "artifact:proposal": "^\\.story-telling-stm/runs/[^/]+/agents/story-strategist/proposal\\.md$"

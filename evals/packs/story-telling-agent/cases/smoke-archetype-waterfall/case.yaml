id: smoke-archetype-waterfall
pack: story-telling-agent
description: "Exercises the `waterfall` styled recipe (session 2026-05-04-c8d3b2a1). The deck must include a waterfall slide with a start total, ordered signed deltas, and an end total. Bars must share a zero-baseline (validated by `check_archetypes.py::waterfall_zero_baseline`)."

prompt_file: prompt.md

workspace:
  isolation: copy-tree
  inputs_dir: inputs/
  golden_dir: golden/
  steps:
    - kind: git_init
    - kind: copy_tree
      src: inputs/
      dest: .
    - kind: copy_tree
      src: ../../../../../agent-packs/story-telling-agent/.github/agents
      dest: .github/agents
    - kind: copy_tree
      src: ../../../../../agent-packs/story-telling-agent/.github/skills
      dest: .github/skills

teardown:
  policy: delete-on-pass

limits:
  web_invocations_max: 1

expected:
  artifacts:
    - id: deck-spec
      path_pattern: "^\\.story-telling-stm/runs/[^/]+/agents/deck-builder/deck-spec\\.json$"
      required: true
    - id: deck-pptx
      path_pattern: "^\\.story-telling-stm/runs/[^/]+/agents/deck-builder/output\\.pptx$"
      required: true
    - id: qa-report
      path_pattern: "^\\.story-telling-stm/runs/[^/]+/agents/deck-critic/qa-report\\.json$"
      required: true
  invocations:
    story-strategist: { min: 1, max: 2 }
    deck-builder: { min: 1, max: 2 }
    deck-critic: { min: 1, max: 2 }
  rubric_targets:
    "artifact:deck-spec": "^\\.story-telling-stm/runs/[^/]+/agents/deck-builder/deck-spec\\.json$"

# Archetype-specific structural expectation (informational — surfaces
# the intent for `check_archetypes.py` to enforce in a later iteration;
# rubrics stay at info severity for this first archetype-coverage pass).
archetype_check:
  recipe: waterfall
  builder: "_styled_waterfall"
  expectation: "Deck includes one slide whose `style_recipe` is `waterfall` and `waterfall.start.value + sum(waterfall.steps[].delta) approximately equals waterfall.end.value` (the zero-baseline algebra check)."

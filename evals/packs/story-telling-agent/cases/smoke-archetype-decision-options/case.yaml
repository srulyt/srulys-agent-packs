id: smoke-archetype-decision-options
pack: story-telling-agent
description: "Exercises the `decision_options` styled recipe (session 2026-05-04-c8d3b2a1) for >3 options. Verifies that the deck-builder uses `decision_options` rather than the existing 3-column `comparison-columns` simple builder when more than 3 options are present."

prompt_file: prompt.md

workspace:
  isolation: copy-tree
  inputs_dir: inputs/
  golden_dir: golden/
  steps:
    - kind: git_init
    - kind: copy_tree
      src: inputs/
      dest: .
    - kind: copy_tree
      src: ../../../../../agent-packs/story-telling-agent/.github/agents
      dest: .github/agents
    - kind: copy_tree
      src: ../../../../../agent-packs/story-telling-agent/.github/skills
      dest: .github/skills

teardown:
  policy: delete-on-pass

limits:
  web_invocations_max: 1

expected:
  artifacts:
    - id: deck-spec
      path_pattern: "^\\.story-telling-stm/runs/[^/]+/agents/deck-builder/deck-spec\\.json$"
      required: true
    - id: deck-pptx
      path_pattern: "^\\.story-telling-stm/runs/[^/]+/agents/deck-builder/output\\.pptx$"
      required: true
    - id: qa-report
      path_pattern: "^\\.story-telling-stm/runs/[^/]+/agents/deck-critic/qa-report\\.json$"
      required: true
  invocations:
    story-strategist: { min: 1, max: 2 }
    deck-builder: { min: 1, max: 2 }
    deck-critic: { min: 1, max: 2 }
  rubric_targets:
    "artifact:deck-spec": "^\\.story-telling-stm/runs/[^/]+/agents/deck-builder/deck-spec\\.json$"

# Archetype-specific structural expectation (informational — surfaces
# the intent for `check_archetypes.py` to enforce in a later iteration;
# rubrics stay at info severity for this first archetype-coverage pass).
archetype_check:
  recipe: decision_options
  builder: "_styled_decision_options"
  expectation: "Deck includes one slide whose `style_recipe` is `decision_options` with `options[]` length >=4 (proving the >3 path is exercised), `criteria[]` non-empty, and `recommendation` set to one of the option names."

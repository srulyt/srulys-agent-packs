id: smoke-visual-qa-loop
pack: story-telling-agent
description: "Tests the QA revise loop. deck-builder produces an intentionally problematic first draft (per prompt instructions); deck-critic flags ≥2 issues with verdict=revise; deck-builder retries with the top-fixes; deck-critic re-runs and verdicts pass. Verifies qa_iteration counter and bounded retry (cap=2)."

prompt_file: prompt.md

workspace:
  isolation: copy-tree
  inputs_dir: inputs/
  golden_dir: golden/
  steps:
    - kind: git_init
    - kind: copy_tree
      src: inputs/
      dest: .
    - kind: copy_tree
      src: ../../../../../agent-packs/story-telling-agent/.github/agents
      dest: .github/agents
    - kind: copy_tree
      src: ../../../../../agent-packs/story-telling-agent/.github/skills
      dest: .github/skills

teardown:
  policy: delete-on-pass

limits:
  web_invocations_max: 1

expected:
  artifacts:
    - id: deck-pptx
      path_pattern: "^\\.story-telling-stm/runs/[^/]+/agents/deck-builder/output\\.pptx$"
      required: true
    - id: qa-report
      path_pattern: "^\\.story-telling-stm/runs/[^/]+/agents/deck-critic/qa-report\\.json$"
      required: true
  invocations:
    story-strategist: { min: 1, max: 2 }
    deck-builder: { min: 2, max: 3 }
    deck-critic: { min: 2, max: 3 }
  state_assertions:
    qa_iteration_min: 1
    qa_iteration_max: 2
  rubric_targets:
    "artifact:qa-report": "^\\.story-telling-stm/runs/[^/]+/agents/deck-critic/qa-report\\.json$"

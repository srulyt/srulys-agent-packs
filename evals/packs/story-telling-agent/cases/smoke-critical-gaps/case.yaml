id: smoke-critical-gaps
pack: story-telling-agent
description: "Tests the gaps-detection path. User provides a thin brief with no audience, no decision, no facts. Story-strategist should return status=needs-clarification (NOT a fabricated proposal). Orchestrator should surface the gaps to the user without proceeding to build."

prompt_file: prompt.md

workspace:
  isolation: copy-tree
  inputs_dir: inputs/
  golden_dir: golden/
  steps:
    - kind: git_init
    - kind: copy_tree
      src: inputs/
      dest: .
    - kind: copy_tree
      src: ../../../../../agent-packs/story-telling-agent/.github/agents
      dest: .github/agents
    - kind: copy_tree
      src: ../../../../../agent-packs/story-telling-agent/.github/skills
      dest: .github/skills

teardown:
  policy: delete-on-pass

limits:
  web_invocations_max: 2

expected:
  artifacts:
    - id: state
      path_pattern: "^\\.story-telling-stm/runs/[^/]+/state\\.json$"
      required: true
    - id: gaps
      path_pattern: "^\\.story-telling-stm/runs/[^/]+/agents/story-strategist/gaps\\.md$"
      required: true
    - id: deck-pptx
      path_pattern: "^\\.story-telling-stm/runs/[^/]+/agents/deck-builder/output\\.pptx$"
      required: false
      forbidden: true
  invocations:
    story-strategist: { min: 1, max: 2 }
    deck-builder: { min: 0, max: 0 }
    deck-critic: { min: 0, max: 0 }
  state_assertions:
    user_approved: false
    phase_in: ["proposal", "intake", "feedback"]

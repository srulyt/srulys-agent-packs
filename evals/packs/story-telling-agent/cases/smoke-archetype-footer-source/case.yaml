id: smoke-archetype-footer-source
pack: story-telling-agent
description: "Exercises the `footer_source` partial overlay (session 2026-05-04-c8d3b2a1). At least one content slide must include a `footer` block (source citation + page number + confidentiality marker), proving the partial applies to ANY slide regardless of its primary builder."

prompt_file: prompt.md

workspace:
  isolation: copy-tree
  inputs_dir: inputs/
  golden_dir: golden/
  steps:
    - kind: git_init
    - kind: copy_tree
      src: inputs/
      dest: .
    - kind: copy_tree
      src: ../../../../../agent-packs/story-telling-agent/.github/agents
      dest: .github/agents
    - kind: copy_tree
      src: ../../../../../agent-packs/story-telling-agent/.github/skills
      dest: .github/skills

teardown:
  policy: delete-on-pass

limits:
  web_invocations_max: 1

expected:
  artifacts:
    - id: deck-spec
      path_pattern: "^\\.story-telling-stm/runs/[^/]+/agents/deck-builder/deck-spec\\.json$"
      required: true
    - id: deck-pptx
      path_pattern: "^\\.story-telling-stm/runs/[^/]+/agents/deck-builder/output\\.pptx$"
      required: true
    - id: qa-report
      path_pattern: "^\\.story-telling-stm/runs/[^/]+/agents/deck-critic/qa-report\\.json$"
      required: true
  invocations:
    story-strategist: { min: 1, max: 2 }
    deck-builder: { min: 1, max: 2 }
    deck-critic: { min: 1, max: 2 }
  rubric_targets:
    "artifact:deck-spec": "^\\.story-telling-stm/runs/[^/]+/agents/deck-builder/deck-spec\\.json$"

# Archetype-specific structural expectation (informational — surfaces
# the intent for `check_archetypes.py` to enforce in a later iteration;
# rubrics stay at info severity for this first archetype-coverage pass).
archetype_check:
  recipe: footer_source
  builder: "_apply_footer_source (partial)"
  expectation: "Deck includes >=1 slide with a non-null `footer` object on a slide whose `style_recipe` is anything OTHER than the 7 archetype recipes added this session (proving the partial composes with existing builders). At least one of `footer.source`, `footer.page`, or `footer.confidentiality` must be set."

id: smoke-early-stage-summary
pack: product-brief
description: |
  Smoke test: early-stage brief from thin source material (a single
  short note). Verifies maturity is assessed as early-stage,
  strategy-modeler is SKIPPED, closing-section type defaults to
  Summary, and the brief composer produces a focused 5-section brief
  that may be significantly under 1,500 words.

prompt_file: prompt.md

prompt_template_vars: {}

workspace:
  isolation: copy-tree
  inputs_dir: inputs/
  golden_dir: golden/
  steps:
    - kind: git_init
    - kind: copy_tree
      src: inputs/
      dest: .
    - kind: copy_tree
      src: ../../../../../agent-packs/product-brief/.github/agents
      dest: .github/agents
    - kind: copy_tree
      src: ../../../../../agent-packs/product-brief/.github/skills
      dest: .github/skills
    - kind: copy_tree
      src: ../../../../../agent-packs/copilot-factory/.github/agents/eval-judge.agent.md
      dest: .github/agents/eval-judge.agent.md

teardown:
  policy: delete-on-pass

expected:
  artifacts:
    - id: final-brief
      path_pattern: "^\\.product-brief-agent-stm/runs/[^/]+/agents/brief-orchestrator/product-brief\\.md$"
      required: true
    - id: maturity-assessment
      path_pattern: "^\\.product-brief-agent-stm/runs/[^/]+/agents/brief-orchestrator/maturity-assessment\\.md$"
      required: true
  invocations:
    evidence-analyst: { min: 1, max: 2 }
    strategy-modeler: { min: 0, max: 0 }
    brief-composer: { min: 1, max: 2 }
  rubric_targets:
    "artifact:final-brief": "^\\.product-brief-agent-stm/runs/[^/]+/agents/brief-orchestrator/product-brief\\.md$"

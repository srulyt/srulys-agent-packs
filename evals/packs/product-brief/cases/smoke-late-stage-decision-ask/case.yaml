id: smoke-late-stage-decision-ask
pack: product-brief
description: |
  Smoke test: late-stage brief with explicit Decision Ask signals
  (funding approval requested). Verifies the full happy-path flow
  evidence-analyst → strategy-modeler → brief-composer, with
  closing-section type assessed as Decision Ask, and the orchestrator
  emitting final-artifacts-json with a populated product-brief.md.

prompt_file: prompt.md

prompt_template_vars: {}

workspace:
  isolation: copy-tree
  inputs_dir: inputs/
  golden_dir: golden/
  steps:
    - kind: git_init
    - kind: copy_tree
      src: inputs/
      dest: .
    - kind: copy_tree
      src: ../../../../../agent-packs/product-brief/.github/agents
      dest: .github/agents
    - kind: copy_tree
      src: ../../../../../agent-packs/product-brief/.github/skills
      dest: .github/skills
    - kind: copy_tree
      src: ../../../../../agent-packs/copilot-factory/.github/agents/eval-judge.agent.md
      dest: .github/agents/eval-judge.agent.md

teardown:
  policy: delete-on-pass

expected:
  artifacts:
    - id: final-brief
      path_pattern: "^\\.product-brief-agent-stm/runs/[^/]+/agents/brief-orchestrator/product-brief\\.md$"
      required: true
    - id: handoff-report
      path_pattern: "^\\.product-brief-agent-stm/runs/[^/]+/agents/brief-orchestrator/handoff-report\\.md$"
      required: true
    - id: evidence-log
      path_pattern: "^\\.product-brief-agent-stm/runs/[^/]+/agents/evidence-analyst/evidence-log\\.md$"
      required: true
    - id: decision-model
      path_pattern: "^\\.product-brief-agent-stm/runs/[^/]+/agents/strategy-modeler/decision-model\\.md$"
      required: true
    - id: draft-brief
      path_pattern: "^\\.product-brief-agent-stm/runs/[^/]+/agents/brief-composer/product-brief\\.draft\\.md$"
      required: true
  invocations:
    evidence-analyst: { min: 1, max: 2 }
    strategy-modeler: { min: 1, max: 2 }
    brief-composer: { min: 1, max: 2 }
  rubric_targets:
    "artifact:final-brief": "^\\.product-brief-agent-stm/runs/[^/]+/agents/brief-orchestrator/product-brief\\.md$"

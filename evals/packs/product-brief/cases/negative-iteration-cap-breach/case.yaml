id: negative-iteration-cap-breach
pack: product-brief
description: |
  Negative test: verifies the orchestrator respects the per-specialist
  iteration cap (composer = 2). When the composer returns a
  rejection-triggering draft on every attempt, the orchestrator must
  emit an escalate-to-user fence on the third would-be re-delegation
  rather than silently looping.

prompt_file: prompt.md

prompt_template_vars: {}

workspace:
  isolation: copy-tree
  inputs_dir: inputs/
  golden_dir: golden/
  steps:
    - kind: git_init
    - kind: copy_tree
      src: inputs/
      dest: .
    - kind: copy_tree
      src: ../../../../../agent-packs/product-brief/.github/agents
      dest: .github/agents
    - kind: copy_tree
      src: ../../../../../agent-packs/product-brief/.github/skills
      dest: .github/skills
    - kind: copy_tree
      src: ../../../../../agent-packs/copilot-factory/.github/agents/eval-judge.agent.md
      dest: .github/agents/eval-judge.agent.md

teardown:
  policy: delete-on-pass

expected:
  artifacts:
    - id: state
      path_pattern: "^\\.product-brief-agent-stm/runs/[^/]+/state\\.json$"
      required: true
  invocations:
    brief-composer: { min: 1, max: 3 }
  rubric_targets:
    "trace:final-message": "escalate-to-user"

# Pack spec for product-brief.
#
# Encodes the contracts the five agents declare in their .agent.md
# front-matter and "File Access Boundaries" / "Output Contract" /
# "Must NOT" sections. Cases under cases/ may override expectations
# per case.
#
# See eval_engine/docs/01-spec-schema.md for the full schema.

schema_version: 1
pack: product-brief
orchestrator: brief-orchestrator

# Per-role model pins. Single source of truth; agent prompts
# explicitly reference this file rather than inlining models.
models:
  brief-orchestrator: claude-sonnet-4.6
  evidence-analyst: claude-sonnet-4.6
  strategy-modeler: claude-sonnet-4.6
  brief-composer: claude-sonnet-4.6
  research-runner: claude-sonnet-4.6
  judge: claude-opus-4.7

loops:
  max_orchestrator_turns: 80

flow:
  ordering:
    - [evidence-analyst, strategy-modeler]
    - [evidence-analyst, brief-composer]
    - [strategy-modeler, brief-composer]
  no_unexpected_agents: true

agents:
  - name: brief-orchestrator
    invocations: { min: 1, max: 1, must_complete: true }
    allowed_tools: [read, search, write, agent]
    write_scope_allow:
      - "^\\.product-brief-agent-stm/runs/[^/]+/.*"
      - "^\\.product-brief-agent-stm/current-session\\.json$"
    read_scope_allow:
      - "^\\.product-brief-agent-stm/.*"
      - "^\\.github/skills/product-brief-framework/.*"
      - "^\\.github/skills/evidence-integrity/.*"
      - "^\\.github/skills/decision-metrics-financials/.*"
      - "^\\.github/skills/executive-writing-style/.*"
      - "^\\.github/skills/stakeholder-psychology/.*"
      - "^\\.github/skills/agent-builder/.*"
      - "^\\.context/.*"
      - "^inputs/.*"
    scope_deny:
      - "^_eval/"
      - "^\\.git/"
    prompt_contract:
      required_sections:
        - "Hard Delegation Rule (STOP-and-delegate)"
        - "How to Delegate (Task Tool Mechanics)"
        - "Mandatory Delegation"
        - "Parsing Specialist Output (Verbatim Pass-Through)"
        - "Iteration Caps (HARD)"
        - "File Access Boundaries"
        - "Must NOT"
      required_fields: []
    output_contract:
      must_contain_sections:
        - "final-artifacts-json"
    token_budget_max: 120000
    no_subagent_reinvocation: false

  - name: evidence-analyst
    invocations: { min: 1, max: 3, must_complete: true }
    allowed_tools: [read, search]
    write_scope_allow: []
    read_scope_allow:
      - "^\\.context/.*"
      - "^inputs/.*"
      - "^\\.product-brief-agent-stm/runs/[^/]+/agents/evidence-analyst/.*"
      - "^\\.github/skills/evidence-integrity/.*"
      - "^\\.github/skills/product-brief-framework/.*"
    scope_deny:
      - "^_eval/"
      - "^\\.git/"
    prompt_contract:
      required_sections:
        - "Invocation Guard"
        - "Invocation Contract"
        - "Output Contract"
        - "File Access Boundaries"
        - "Must NOT"
      required_fields:
        - "session"
        - "iteration-count"
    output_contract:
      must_contain_sections:
        - "evidence-log"
        - "contradictions-json"
        - "assumptions-open-questions-json"
        - "handoff"
    token_budget_max: 80000
    no_subagent_reinvocation: true

  - name: strategy-modeler
    invocations: { min: 0, max: 3, must_complete: false }
    allowed_tools: [read, search]
    write_scope_allow: []
    read_scope_allow:
      - "^\\.product-brief-agent-stm/runs/[^/]+/agents/evidence-analyst/.*"
      - "^\\.product-brief-agent-stm/runs/[^/]+/agents/strategy-modeler/.*"
      - "^\\.github/skills/decision-metrics-financials/.*"
      - "^\\.github/skills/stakeholder-psychology/.*"
      - "^\\.github/skills/product-brief-framework/.*"
    scope_deny:
      - "^_eval/"
      - "^\\.git/"
    prompt_contract:
      required_sections:
        - "Invocation Guard"
        - "Invocation Contract"
        - "Output Contract"
        - "File Access Boundaries"
        - "Must NOT"
      required_fields:
        - "session"
        - "maturity"
        - "closing-type"
        - "iteration-count"
    output_contract:
      must_contain_sections:
        - "decision-model"
        - "gaps-summary-json"
        - "handoff"
    token_budget_max: 80000
    no_subagent_reinvocation: true

  - name: brief-composer
    invocations: { min: 1, max: 3, must_complete: true }
    allowed_tools: [read]
    write_scope_allow: []
    read_scope_allow:
      - "^\\.product-brief-agent-stm/runs/[^/]+/agents/evidence-analyst/.*"
      - "^\\.product-brief-agent-stm/runs/[^/]+/agents/strategy-modeler/.*"
      - "^\\.product-brief-agent-stm/runs/[^/]+/agents/brief-composer/.*"
      - "^\\.github/skills/product-brief-framework/.*"
      - "^\\.github/skills/executive-writing-style/.*"
      - "^\\.github/skills/stakeholder-psychology/.*"
    scope_deny:
      - "^_eval/"
      - "^\\.git/"
    prompt_contract:
      required_sections:
        - "Invocation Guard"
        - "Invocation Contract"
        - "Output Contract"
        - "File Access Boundaries"
        - "Must NOT"
      required_fields:
        - "session"
        - "maturity"
        - "closing-type"
        - "iteration-count"
    output_contract:
      must_contain_sections:
        - "product-brief-draft"
        - "maturity-applied"
        - "handoff"
    token_budget_max: 100000
    no_subagent_reinvocation: true

  - name: research-runner
    invocations: { min: 0, max: 4, must_complete: false }
    allowed_tools: [read, search, execute]
    write_scope_allow: []
    read_scope_allow:
      - "^\\.context/.*"
      - "^inputs/.*"
      - "^\\.product-brief-agent-stm/runs/[^/]+/agents/research-runner/.*"
      - "^\\.github/skills/product-brief-framework/.*"
    scope_deny:
      - "^_eval/"
      - "^\\.git/"
    prompt_contract:
      required_sections:
        - "Invocation Guard"
        - "Invocation Contract"
        - "Output Contract"
        - "File Access Boundaries"
        - "Must NOT"
      required_fields:
        - "session"
        - "task"
        - "request"
        - "iteration-count"
    output_contract:
      must_contain_sections:
        - "web-research"
        - "url-fetch"
        - "command-results"
        - "handoff"
    token_budget_max: 60000
    no_subagent_reinvocation: true

# Rubrics — all start at severity: info per eval-authoring rules.
# Promote to warn/blocker only after >= 3 baseline runs.
rubrics:
  - id: delegation-coverage
    description: "Every domain action (evidence extraction, strategy modeling, narrative drafting, URL/command execution) is performed via task() to the correct specialist; orchestrator does no specialist work itself."
    apply_to: trace:invocations
    severity: info

  - id: output-contract-fences-present
    description: "Every specialist's final assistant message contains all named fenced blocks declared in its Output Contract; no fence is omitted, even when blocked or empty."
    apply_to: trace:specialist-outputs
    severity: info

  - id: orchestrator-no-direct-source-read
    description: "Orchestrator does not read user source files (.context/, inputs/) directly for evidence extraction; it delegates to evidence-analyst."
    apply_to: trace:orchestrator-reads
    severity: info

  - id: model-pin-honored
    description: "Every task() invocation either passes no model override or passes the model declared in models: above; no silent model drift."
    apply_to: trace:invocations
    severity: info

  - id: editing-pass-applied
    description: "After composer returns, orchestrator persists product-brief-draft fence verbatim to product-brief.draft.md AND mutates that file in place during editing pass; final product-brief.md exists."
    apply_to: artifact:final-brief
    severity: info

  - id: zero-links
    description: "Final brief contains zero markdown links, zero bare URLs, zero hyperlinks."
    apply_to: artifact:final-brief
    severity: info

  - id: word-count-within-ceiling
    description: "Final brief word count is at or below 2,500 words. Early-stage briefs may be significantly shorter — that is acceptable."
    apply_to: artifact:final-brief
    severity: info

  - id: no-bold-as-structure
    description: "Final brief uses no **bold** as a structural label or standalone line; bold appears only for inline emphasis within running text."
    apply_to: artifact:final-brief
    severity: info

  - id: heading-naturalness
    description: "Final brief headings are content-descriptive, short, neutral, professional, non-prescriptive; no literal framework section labels."
    apply_to: artifact:final-brief
    severity: info

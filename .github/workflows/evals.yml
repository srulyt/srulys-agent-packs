name: Evals

on:
  pull_request:
    paths:
      - 'agent-packs/**'
      - '.github/skills/**'
      - '.github/instructions/**'
      - 'evals/**'
      - 'scripts/lint_pack.py'
      - '.github/workflows/evals.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Fast, deterministic: runs on every PR. No copilot binary required.
  static:
    name: Static (lint + helper smoke tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: evals/requirements.txt
      - name: Install
        run: pip install -r evals/requirements.txt
      - name: Lint all packs
        run: python -m scripts.lint_pack --all
      - name: Static pytest suite
        working-directory: evals
        run: pytest static/ -v --report-log=../static-report.jsonl
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: static-report
          path: static-report.jsonl

  # Slow + costs LLM tokens: matrix per pack so failures isolate cleanly.
  # Only runs if `copilot` is installed (the install step is a no-op
  # placeholder until a CI-friendly install method exists; until then
  # this job will skip).
  packs:
    name: Pack evals (${{ matrix.pack }})
    runs-on: ubuntu-latest
    needs: static
    strategy:
      fail-fast: false
      matrix:
        pack:
          - copilot-factory
          - product-brief
          - spec-author
          - story-telling-agent
          # add more packs as their pytest evals land
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: evals/requirements.txt
      - run: pip install -r evals/requirements.txt
      - name: Check for copilot CLI
        id: copilot
        run: |
          if command -v copilot >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::copilot CLI not installed in CI image; skipping pack evals."
          fi
      - name: Run pack evals
        if: steps.copilot.outputs.available == 'true'
        working-directory: evals
        run: |
          pytest packs/${{ matrix.pack }}/ -v -n auto \
                 --report-log=../pack-${{ matrix.pack }}-report.jsonl \
                 --html=../pack-${{ matrix.pack }}-report.html --self-contained-html
      - uses: actions/upload-artifact@v4
        if: always() && steps.copilot.outputs.available == 'true'
        with:
          name: pack-${{ matrix.pack }}-report
          path: |
            pack-${{ matrix.pack }}-report.jsonl
            pack-${{ matrix.pack }}-report.html

  skills:
    name: Skill evals
    runs-on: ubuntu-latest
    needs: static
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: evals/requirements.txt
      - run: pip install -r evals/requirements.txt
      - name: Check for copilot CLI
        id: copilot
        run: |
          if command -v copilot >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::copilot CLI not installed in CI image; skipping skill evals."
          fi
      - name: Run skill evals
        if: steps.copilot.outputs.available == 'true'
        working-directory: evals
        run: |
          pytest skills/ -v -n auto \
                 --report-log=../skills-report.jsonl \
                 --html=../skills-report.html --self-contained-html
      - uses: actions/upload-artifact@v4
        if: always() && steps.copilot.outputs.available == 'true'
        with:
          name: skills-report
          path: |
            skills-report.jsonl
            skills-report.html
